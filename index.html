<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Caffe Jazz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- The Wooden Cafe Table (Top-Down View) -->
    <div id="table-surface">
        
        <div class="mood-text">Pick a record for tonight...</div>

        <!-- Left side: Featured Staff Picks -->
        <div id="featured-cds">
            <div class="record-sleeve featured" data-category="1940s" data-title="1940s Swing" style="--rotation: -12deg; background-image: url('./assets/images/record1.png');">
                <div class="sleeve-title" style="display: none;">1940s Swing</div>
                <div class="sleeve-vinyl"></div>
            </div>
            
            <div class="record-sleeve featured" data-category="1950s" data-title="1950s Cool Jazz" style="--rotation: 8deg; background-image: url('./assets/images/record2.png');">
                <div class="sleeve-title" style="display: none;">1950s Cool</div>
                <div class="sleeve-vinyl"></div>
            </div>
            
            <div class="record-sleeve featured" data-category="1990s" data-title="90s Lofi Beats" style="--rotation: -4deg; background-image: url('./assets/images/record3.png');">
                <div class="sleeve-title" style="display: none;">90s Lofi</div>
                <div class="sleeve-vinyl"></div>
            </div>
        </div>

        <!-- Right side: CD Cabinet Store -->
        <div id="cab-pos">
            <div id="cab-structure">
                <div class="cabinet-tabs">
                    <button class="tab-btn active" data-category="1940s">1940s</button>
                    <button class="tab-btn" data-category="1950s">1950s</button>
                    <button class="tab-btn" data-category="1990s">1990s</button>
                </div>
                <!-- Middle: Scrollable Grid -->
                <div id="cd-grid">
                    <!-- CDs will be injected here by Javascript -->
                </div>
                <!-- Bottom Highlight Glow -->
                <div class="cabinet-glow"></div>
            </div>
        </div>

        <!-- Center: The Turntable -->
        <div id="turntable">
            <div class="turntable-base">
                <div class="knob top-left"></div>
                <div class="platter" id="platter">
                    <div class="spindle"></div>
                    <div class="grooves"></div>
                    <div class="active-label" id="vinyl-label"></div>
                </div>
                <div class="tone-arm-base">
                    <div class="tone-arm" id="tone-arm"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Hidden YouTube Player -->
    <div style="display:none;">
        <div id="yt-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
