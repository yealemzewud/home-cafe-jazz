<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Caffe Jazz - Listening Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lofi-container">
        <!-- Fullscreen Background -->
        <div id="main-background" style="background-image: url('morning.png');"></div>
        <div id="vignette"></div>
        <div id="stars-container"></div>

        <!-- Top UI Overlays -->
        <header>
            <div class="now-playing-container" style="display: flex; align-items: center;">
                <button id="play-pause-btn" class="control-btn">
                    <svg id="play-icon" style="display:inline-block;" fill="currentColor" width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" style="display:none;" fill="currentColor" width="24" height="24" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <span class="label">Now Playing :</span>
                <span id="track-title">Selecting mood...</span>
            </div>

            <div class="branding">
                <div class="audio-wave">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <span class="brand-name">Home Cafe Jazz</span>
            </div>
        </header>

        <div id="bottom-controls">
            <nav id="sub-nav-morning" class="sub-nav">
                <span class="sub-nav-label">Morning Vibe:</span>
                <button class="nav-btn sub-nav-btn active" data-category="morning" data-display="Morning Jazz">Default</button>
                <button class="nav-btn sub-nav-btn" data-category="morning-coffee" data-display="Coffee Time Jazz">☕ Coffee</button>
                <button class="nav-btn sub-nav-btn" data-category="morning-tea" data-display="Tea Jazz">🍵 Tea</button>
            </nav>
            
            <nav id="playlist-nav">
                <button class="nav-btn active" data-category="morning" data-display="Morning Jazz">Morning</button>
                <button class="nav-btn" data-category="afternoon" data-display="Afternoon Jazz">Afternoon</button>
                <button class="nav-btn" data-category="evening" data-display="Evening Jazz">Evening</button>
                <button class="nav-btn" data-category="night" data-display="Night Jazz">Night</button>
                <select id="year-dropdown" class="nav-btn">
                    <option value="" disabled selected>Pick a Year</option>
                </select>
            </nav>
        </div>
    </div>

    <!-- Center Text Overlay -->
    <div id="mood-text-container" class="mood-text">
        <h1 id="mood-title"></h1>
        <p id="mood-subtitle"></p>
    </div>

    <!-- Hidden YouTube Player -->
    <div style="display:none;">
        <div id="yt-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
